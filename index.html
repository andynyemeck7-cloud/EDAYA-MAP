<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDAYA MAP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; height: 100vh; overflow: hidden; color: white; }
        .dept-path { fill: #1e293b; stroke: #334155; stroke-width: 0.6; transition: all 0.2s; cursor: pointer; }
        .dept-path:hover { fill: #334155; stroke: #6366f1; stroke-width: 1.2; }
        .dept-path.has-data { fill: #1e1b4b; stroke: #6366f1; stroke-width: 0.8; }
        .dept-path.selected { fill: #4338ca; stroke: #ffffff; stroke-width: 1.5; }
        .map-tooltip { position: fixed; pointer-events: none; background: #1e293b; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; z-index: 1000; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .main-layout { display: grid; grid-template-columns: 520px 1fr; height: calc(100vh - 80px); }
        .france-svg { width: 100%; height: auto; max-width: 480px; max-height: 90%; filter: drop-shadow(0 12px 24px rgba(0,0,0,0.2)); display: block; margin: auto; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCSJEBhDAgRVksDBE5Oax-qXFZLMQrE2mw",
            authDomain: "edayamap.firebaseapp.com",
            databaseURL: "https://edayamap-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "edayamap",
            storageBucket: "edayamap.firebasestorage.app",
            messagingSenderId: "652778578559",
            appId: "1:652778578559:web:8cb7a0f173740dd0ef554a"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const Icon = ({ name }) => {
            if (name === 'plus') return <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
            if (name === 'edit') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
            if (name === 'trash') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
            if (name === 'upload') return <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
            if (name === 'download') return <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
            if (name === 'x') return <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
            return null;
        };

        const App = () => {
            const [step, setStep] = useState('login'); 
            const [country, setCountry] = useState(null);
            const [pass, setPass] = useState('');
            const [localData, setLocalData] = useState([]);
            const [selectedDept, setSelectedDept] = useState(null);
            const [hoveredDept, setHoveredDept] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [filters, setFilters] = useState({ type: 'All', cat: 'All' });
            const [geoPaths, setGeoPaths] = useState([]);
            const [modalMode, setModalMode] = useState(null);
            const [activeEntry, setActiveEntry] = useState(null);
            const fileInputRef = useRef(null);

            const handleLogin = (e) => {
                e.preventDefault();
                if (pass === 'EdayaMap') setStep('menu');
                else alert('Mot de passe incorrect');
            };

            useEffect(() => {
                if (step !== 'map') return;
                const dataRef = db.ref(`opportunities_${country}`);
                dataRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    const list = data ? Object.keys(data).map(key => ({ ...data[key], fbKey: key })) : [];
                    setLocalData(list);
                });
                return () => dataRef.off();
            }, [step, country]);

            useEffect(() => {
                if (step !== 'map') return;
                const url = country === 'france' 
                    ? 'https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements-version-simplifiee.geojson'
                    : 'https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/belgium.geojson';
                
                fetch(url).then(res => res.json()).then(data => {
                    setGeoPaths(data.features.map(f => ({ 
                        id: country === 'france' ? f.properties.code : f.properties.name, 
                        name: f.properties.nom || f.properties.name, 
                        geometry: f.geometry 
                    })));
                });
            }, [step, country]);

            const project = (coords) => {
                if (country === 'france') return [(coords[0] + 5.15) * 44, (51.45 - coords[1]) * 64];
                return [(coords[0] - 2.5) * 120, (51.6 - coords[1]) * 180];
            };

            const renderPath = (geometry) => {
                const polys = geometry.type === "Polygon" ? [geometry.coordinates] : geometry.coordinates;
                return polys.map(poly => `M ${poly[0].map(c => project(c).join(",")).join(" L ")} Z`).join(" ");
            };

            const filteredData = useMemo(() => {
                return localData.filter(i => {
                    const t = filters.type === 'All' || i.type === filters.type;
                    const c = filters.cat === 'All' || i.cat === filters.cat;
                    const d = !selectedDept || String(i.dept) === String(selectedDept);
                    return t && c && d;
                });
            }, [localData, filters, selectedDept]);

            const deptsWithData = useMemo(() => {
                const visibleSet = new Set();
                localData.forEach(i => {
                    const t = filters.type === 'All' || i.type === filters.type;
                    const c = filters.cat === 'All' || i.cat === filters.cat;
                    if (t && c) visibleSet.add(String(i.dept));
                });
                return visibleSet;
            }, [localData, filters]);

            const handleImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const content = event.target.result;
                    const lines = content.split(/\r?\n/).filter(l => l.trim());
                    const sep = content.includes(';') ? ';' : ',';
                    const existingNames = new Set(localData.map(item => item.name.trim().toLowerCase()));

                    const allDataInFile = lines.slice(1).map(line => {
                        const parts = line.split(new RegExp(`${sep}(?=(?:(?:[^"]*"){2})*[^"]*$)`)).map(p => p.replace(/^"|"$/g, '').trim());
                        return { 
                            name: parts[1] || "", city: parts[2] || "", dept: String(parts[3] || "").replace(/^0(?=\d)/, ''), 
                            type: parts[4] || "", cat: parts[5] || "", url: parts[6] || "", 
                            email: parts[7] || "", address: parts[8] || "" 
                        };
                    }).filter(i => i.name);

                    const finalDataToImport = allDataInFile.filter(item => !existingNames.has(item.name.trim().toLowerCase()));
                    const duplicatesCount = allDataInFile.length - finalDataToImport.length;

                    if (finalDataToImport.length === 0) { alert(`Doublons ignorés (${duplicatesCount}).`); return; }

                    if(confirm(`Importer ${finalDataToImport.length} lignes ?`)) {
                        try {
                            const promises = finalDataToImport.map(item => db.ref(`opportunities_${country}`).push({ ...item, id: Date.now() + Math.random() }));
                            await Promise.all(promises);
                            alert("Importation réussie !");
                        } catch (err) { alert("Erreur : " + err.message); }
                    }
                };
                reader.readAsText(file);
            };

            const deleteEntry = (fbKey) => {
                if (window.confirm("Supprimer définitivement cette opportunité ?")) {
                    db.ref(`opportunities_${country}/${fbKey}`).remove()
                      .then(() => alert("Supprimé !"))
                      .catch(err => alert("Erreur : " + err.message));
                }
            };

            const saveEntry = (e) => {
                e.preventDefault();
                const path = `opportunities_${country}`;
                if (modalMode === 'add') db.ref(path).push({ ...activeEntry, id: Date.now() });
                else {
                    const { fbKey, ...updates } = activeEntry;
                    db.ref(`${path}/${fbKey}`).set(updates);
                }
                setModalMode(null);
            };

            if (step === 'login') return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                    <form onSubmit={handleLogin} className="glass p-10 rounded-[3rem] w-full max-w-md text-center animate-in">
                        <h1 className="text-3xl font-black italic mb-8 uppercase tracking-tighter">EDAYA MAP ACCESS</h1>
                        <input type="password" placeholder="Mot de passe" className="w-full p-4 bg-slate-900/50 rounded-2xl border border-white/10 mb-4 focus:border-indigo-500 outline-none text-center font-bold text-white" value={pass} onChange={e => setPass(e.target.value)} />
                        <button type="submit" className="w-full py-4 bg-indigo-600 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-500 transition-all">Entrer</button>
                    </form>
                </div>
            );

            if (step === 'menu') return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                    <div className="max-w-4xl w-full text-center">
                        <h2 className="text-5xl font-black italic mb-12 tracking-tighter uppercase animate-in">ZONE DE PROSPECTION</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-in">
                            <button onClick={() => { setCountry('france'); setStep('map'); }} className="glass p-16 rounded-[3rem] hover:bg-indigo-600 transition-all group">
                                <span className="text-6xl mb-4 block">🇫🇷</span>
                                <h3 className="text-2xl font-black uppercase tracking-tighter">FRANCE</h3>
                            </button>
                            <button onClick={() => { setCountry('belgium'); setStep('map'); }} className="glass p-16 rounded-[3rem] hover:bg-indigo-600 transition-all group">
                                <span className="text-6xl mb-4 block">🇧🇪</span>
                                <h3 className="text-2xl font-black uppercase tracking-tighter">BELGIQUE</h3>
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-screen overflow-hidden" onMouseMove={(e) => setMousePos({ x: e.clientX, y: e.clientY })}>
                    <header className="bg-slate-900 text-white p-5 flex justify-between items-center shadow-xl z-50">
                        <div className="flex items-center gap-4">
                            <button onClick={() => { setStep('menu'); setSelectedDept(null); }} className="text-slate-400 hover:text-white transition-colors"><Icon name="x" /></button>
                            <h1 className="text-2xl font-black italic tracking-tighter uppercase leading-none">EDAYA MAP</h1>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => { setModalMode('add'); setActiveEntry({ name: '', city: '', dept: '', type: 'Lieu', cat: 'Accessible', url: '', email: '', address: '' }); }} className="bg-indigo-600 hover:bg-indigo-500 px-5 py-2.5 rounded-xl text-xs font-black flex items-center gap-2 transition-all">
                                <Icon name="plus" /> AJOUTER
                            </button>
                            <button onClick={() => fileInputRef.current.click()} className="bg-slate-700 hover:bg-slate-600 px-4 py-2.5 rounded-xl text-[10px] font-black flex items-center gap-2 transition-all">
                                <Icon name="upload" /> IMPORTER CSV
                            </button>
                            <input type="file" ref={fileInputRef} className="hidden" accept=".csv" onChange={handleImport} />
                        </div>
                    </header>

                    <div className="main-layout flex flex-grow overflow-hidden">
                        <aside className="bg-slate-900/50 border-r border-white/5 flex flex-col relative">
                            <div className="p-6 bg-slate-900/30">
                                <div className="grid grid-cols-2 gap-3">
                                    <select onChange={(e) => { setFilters(p => ({ ...p, type: e.target.value })); setSelectedDept(null); }} className="w-full p-3 rounded-xl bg-slate-800 text-[11px] font-black outline-none border border-white/10 text-white cursor-pointer">
                                        <option value="All">TOUT TYPE</option>
                                        <option value="Lieu">LIEU</option>
                                        <option value="Festival">FESTIVAL</option>
                                        <option value="Booker">BOOKER</option>
                                        <option value="Media Spé">MEDIA SPÉ</option>
                                    </select>
                                    <select onChange={(e) => { setFilters(p => ({ ...p, cat: e.target.value })); setSelectedDept(null); }} className="w-full p-3 rounded-xl bg-slate-800 text-[11px] font-black outline-none border border-white/10 text-white cursor-pointer">
                                        <option value="All">STATUT</option>
                                        <option value="Accessible">ACCESSIBLE</option>
                                        <option value="Plus tard">PLUS TARD</option>
                                    </select>
                                </div>
                            </div>
                            <div className="flex-grow flex items-center justify-center p-8 bg-slate-950/20">
                                <svg viewBox={country === 'france' ? "0 0 600 650" : "0 0 500 450"} className="france-svg">
                                    {geoPaths.map(dept => (
                                        <path key={dept.id} d={renderPath(dept.geometry)} 
                                            className={`dept-path ${String(selectedDept) === String(dept.id) ? 'selected' : ''} ${deptsWithData.has(String(dept.id)) ? 'has-data' : ''}`}
                                            onClick={() => setSelectedDept(selectedDept === dept.id ? null : dept.id)}
                                            onMouseEnter={() => setHoveredDept(dept)} onMouseLeave={() => setHoveredDept(null)} />
                                    ))}
                                </svg>
                            </div>
                        </aside>

                        <main className="flex-grow overflow-y-auto p-12 bg-slate-950 custom-scrollbar">
                            <div className="max-w-4xl mx-auto">
                                <h2 className="text-6xl font-black text-white uppercase italic tracking-tighter leading-none mb-10 border-b-4 border-indigo-600 pb-4">
                                    {selectedDept ? `Zone ${selectedDept}` : "opportunités"}
                                </h2>
                                <div className="grid gap-3">
                                    {filteredData.length > 0 ? filteredData.map(item => (
                                        <div key={item.fbKey} className="glass p-6 rounded-3xl group animate-in border border-white/5 hover:border-indigo-500/50 transition-all">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <h4 className="text-xl font-black uppercase tracking-tight leading-tight">{item.name}</h4>
                                                    <div className="flex gap-2 mt-2">
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase bg-white/5 px-2 py-0.5 rounded-md">{item.city} ({item.dept})</span>
                                                        <span className="text-[9px] font-black px-2 py-0.5 bg-indigo-500/20 text-indigo-400 rounded-md uppercase border border-indigo-500/30">{item.type}</span>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setModalMode('edit'); setActiveEntry(item); }} className="p-2 text-indigo-400 hover:bg-white hover:text-indigo-600 rounded-lg transition-all"><Icon name="edit" /></button>
                                                    <button onClick={() => deleteEntry(item.fbKey)} className="p-2 text-red-400 hover:bg-red-500 hover:text-white rounded-lg transition-all"><Icon name="trash" /></button>
                                                </div>
                                            </div>
                                            <p className="text-xs text-slate-400 mt-4 italic">{item.address || "Aucune note."}</p>
                                        </div>
                                    )) : <div className="py-20 text-center opacity-20 italic uppercase font-black tracking-widest">Aucune donnée</div>}
                                </div>
                            </div>
                        </main>
                    </div>

                    {hoveredDept && <div className="map-tooltip" style={{ left: mousePos.x + 18, top: mousePos.y - 12 }}>{hoveredDept.id} - {hoveredDept.name}</div>}

                    {modalMode && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
                            <div className="glass w-full max-w-xl rounded-[3rem] overflow-hidden animate-in">
                                <div className="bg-slate-900 p-8 flex justify-between items-center border-b border-white/5">
                                    <h3 className="font-black uppercase text-xl italic">{modalMode === 'add' ? 'Ajouter' : 'Modifier'}</h3>
                                    <button onClick={() => setModalMode(null)}><Icon name="x" /></button>
                                </div>
                                <form onSubmit={saveEntry} className="p-10 space-y-4">
                                    <input required placeholder="Nom structure" className="w-full p-4 bg-slate-900 text-white rounded-2xl border border-white/10 font-bold outline-none" value={activeEntry.name} onChange={e => setActiveEntry({...activeEntry, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required placeholder="Ville" className="p-4 bg-slate-900 text-white rounded-2xl border border-white/10 font-bold outline-none" value={activeEntry.city} onChange={e => setActiveEntry({...activeEntry, city: e.target.value})} />
                                        <input required placeholder="Zone" className="p-4 bg-slate-900 text-white rounded-2xl border border-white/10 font-bold outline-none" value={activeEntry.dept} onChange={e => setActiveEntry({...activeEntry, dept: e.target.value})} />
                                    </div>
                                    <textarea placeholder="Notes / Adresse" className="w-full p-4 bg-slate-900 text-white rounded-2xl border border-white/10 font-bold outline-none" value={activeEntry.address} onChange={e => setActiveEntry({...activeEntry, address: e.target.value})} />
                                    <button type="submit" className="w-full py-5 bg-indigo-600 rounded-[2rem] font-black uppercase tracking-widest text-xs">Sauvegarder</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
