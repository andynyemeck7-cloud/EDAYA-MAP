<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDAYA MAP - Prospective 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; height: 100vh; overflow: hidden; color: white; }
        .dept-path { fill: #1e293b; stroke: #334155; stroke-width: 0.6; transition: all 0.2s; cursor: pointer; }
        .dept-path:hover { fill: #334155; stroke: #6366f1; stroke-width: 1.2; }
        .dept-path.has-data { fill: #1e1b4b; stroke: #6366f1; stroke-width: 0.8; }
        .dept-path.selected { fill: #4338ca; stroke: #ffffff; stroke-width: 1.5; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .main-layout { display: grid; grid-template-columns: 520px 1fr; height: calc(100vh - 80px); }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- CONFIGURATION FIREBASE ---
        const firebaseConfig = {
            apiKey: "VOTRE_API_KEY",
            authDomain: "VOTRE_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://VOTRE_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "VOTRE_PROJECT_ID",
            storageBucket: "VOTRE_PROJECT_ID.appspot.com",
            messagingSenderId: "VOTRE_SENDER_ID",
            appId: "VOTRE_APP_ID"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const Icon = ({ name }) => {
            if (name === 'plus') return <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
            if (name === 'edit') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
            if (name === 'x') return <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
            if (name === 'lock') return <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
            return null;
        };

        const App = () => {
            const [step, setStep] = useState('login'); // login, menu, map
            const [country, setCountry] = useState(null); // france, belgium
            const [pass, setPass] = useState('');
            const [localData, setLocalData] = useState([]);
            const [selectedDept, setSelectedDept] = useState(null);
            const [geoPaths, setGeoPaths] = useState([]);
            const [filters, setFilters] = useState({ type: 'All', cat: 'All' });
            const [modalMode, setModalMode] = useState(null);
            const [activeEntry, setActiveEntry] = useState(null);

            // GESTION CONNEXION
            const handleLogin = (e) => {
                e.preventDefault();
                if (pass === 'EdayaMap') setStep('menu');
                else alert('Mot de passe incorrect');
            };

            // ÉCOUTE FIREBASE (Dynamique selon le pays)
            useEffect(() => {
                if (step !== 'map') return;
                const dataRef = db.ref(`opportunities_${country}`);
                dataRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    const list = data ? Object.keys(data).map(k => ({ ...data[k], fbKey: k })) : [];
                    setLocalData(list);
                });
                return () => dataRef.off();
            }, [step, country]);

            // CHARGEMENT GÉOGRAPHIE
            useEffect(() => {
                if (step !== 'map') return;
                const url = country === 'france' 
                    ? 'https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements-version-simplifiee.geojson'
                    : 'https://raw.githubusercontent.com/codeforgermany/click_that_hood/master/public/data/belgium.geojson';
                
                fetch(url).then(r => r.json()).then(data => {
                    setGeoPaths(data.features.map(f => ({
                        id: country === 'france' ? f.properties.code : f.properties.name,
                        name: f.properties.nom || f.properties.name,
                        geometry: f.geometry
                    })));
                });
            }, [step, country]);

            // PROJECTION CARTOGRAPHIQUE
            const project = (coords) => {
                if (country === 'france') {
                    return [(coords[0] + 5.15) * 44, (51.45 - coords[1]) * 64];
                } else {
                    return [(coords[0] - 2.5) * 120, (51.6 - coords[1]) * 180];
                }
            };

            const renderPath = (geometry) => {
                const polys = geometry.type === "Polygon" ? [geometry.coordinates] : geometry.coordinates;
                return polys.map(poly => `M ${poly[0].map(c => project(c).join(",")).join(" L ")} Z`).join(" ");
            };

            const saveEntry = (e) => {
                e.preventDefault();
                const path = `opportunities_${country}`;
                if (modalMode === 'add') db.ref(path).push({ ...activeEntry, id: Date.now() });
                else {
                    const { fbKey, ...updates } = activeEntry;
                    db.ref(`${path}/${fbKey}`).set(updates);
                }
                setModalMode(null);
            };

            const filteredData = useMemo(() => {
                return localData.filter(i => {
                    const t = filters.type === 'All' || i.type === filters.type;
                    const c = filters.cat === 'All' || i.cat === filters.cat;
                    const d = !selectedDept || String(i.dept) === String(selectedDept);
                    return t && c && d;
                });
            }, [localData, filters, selectedDept]);

            // --- VUES ---

            if (step === 'login') return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                    <form onSubmit={handleLogin} className="glass p-10 rounded-[2.5rem] w-full max-w-md text-center animate-in">
                        <div className="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-indigo-500/30">
                            <Icon name="lock" />
                        </div>
                        <h1 className="text-3xl font-black italic mb-2 tracking-tighter uppercase">Edaya Access</h1>
                        <p className="text-slate-400 text-sm mb-8">Veuillez entrer le mot de passe du label</p>
                        <input type="password" placeholder="Mot de passe" className="w-full p-4 bg-slate-900/50 rounded-2xl border border-white/10 mb-4 focus:border-indigo-500 outline-none transition-all text-center font-bold" value={pass} onChange={e => setPass(e.target.value)} />
                        <button type="submit" className="w-full py-4 bg-indigo-600 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-500 transition-all">Valider</button>
                    </form>
                </div>
            );

            if (step === 'menu') return (
                <div className="h-screen flex items-center justify-center bg-slate-950 p-6">
                    <div className="max-w-4xl w-full text-center">
                        <h2 className="text-5xl font-black italic mb-12 tracking-tighter uppercase animate-in">Choisir une zone</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-in">
                            <button onClick={() => { setCountry('france'); setStep('map'); }} className="glass p-16 rounded-[3rem] hover:bg-indigo-600 transition-all group">
                                <span className="text-6xl mb-4 block group-hover:scale-110 transition-transform">🇫🇷</span>
                                <h3 className="text-2xl font-black uppercase">France</h3>
                            </button>
                            <button onClick={() => { setCountry('belgium'); setStep('map'); }} className="glass p-16 rounded-[3rem] hover:bg-indigo-600 transition-all group">
                                <span className="text-6xl mb-4 block group-hover:scale-110 transition-transform">🇧🇪</span>
                                <h3 className="text-2xl font-black uppercase">Belgique</h3>
                            </button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-slate-900 p-5 flex justify-between items-center border-b border-white/5">
                        <div className="flex items-center gap-6">
                            <button onClick={() => setStep('menu')} className="text-slate-400 hover:text-white transition-colors"><Icon name="x" /></button>
                            <h1 className="text-xl font-black italic uppercase tracking-tighter">EDAYA MAP : {country.toUpperCase()}</h1>
                        </div>
                        <button onClick={() => { setModalMode('add'); setActiveEntry({ name: '', city: '', dept: '', type: 'Lieu', cat: 'Accessible', address: '' }); }} 
                                className="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2">
                            <Icon name="plus" /> AJOUTER
                        </button>
                    </header>

                    <div className="main-layout">
                        <aside className="bg-slate-900/50 flex flex-col border-r border-white/5">
                            <div className="p-6 bg-slate-900/30">
                                <div className="grid grid-cols-2 gap-3">
                                    <select onChange={(e) => setFilters(p => ({ ...p, type: e.target.value }))} className="p-3 bg-slate-800 rounded-xl text-[10px] font-black outline-none border border-white/5">
                                        <option value="All">TOUT TYPE</option><option>Lieu</option><option>Festival</option><option>Booker</option>
                                    </select>
                                    <select onChange={(e) => setFilters(p => ({ ...p, cat: e.target.value }))} className="p-3 bg-slate-800 rounded-xl text-[10px] font-black outline-none border border-white/5">
                                        <option value="All">STATUT</option><option>Accessible</option><option>Plus tard</option>
                                    </select>
                                </div>
                            </div>
                            <div className="flex-grow flex items-center justify-center p-8">
                                <svg viewBox={country === 'france' ? "0 0 600 650" : "0 0 500 450"} className="france-svg">
                                    {geoPaths.map(p => (
                                        <path key={p.id} d={renderPath(p.geometry)} 
                                            className={`dept-path ${selectedDept === p.id ? 'selected' : ''} ${new Set(localData.map(d => String(d.dept))).has(String(p.id)) ? 'has-data' : ''}`}
                                            onClick={() => setSelectedDept(selectedDept === p.id ? null : p.id)} />
                                    ))}
                                </svg>
                            </div>
                        </aside>

                        <main className="overflow-y-auto p-12 custom-scrollbar bg-slate-950">
                            <div className="max-w-4xl mx-auto">
                                <h2 className="text-6xl font-black uppercase italic tracking-tighter mb-10 border-b-4 border-indigo-600 pb-4">
                                    {selectedDept ? `Zone ${selectedDept}` : "Opportunités"}
                                </h2>
                                <div className="grid gap-4">
                                    {filteredData.map(item => (
                                        <div key={item.fbKey} className="glass p-6 rounded-3xl flex justify-between items-center group animate-in">
                                            <div>
                                                <h4 className="text-xl font-black uppercase">{item.name}</h4>
                                                <div className="flex gap-3 mt-1 text-indigo-400 text-[10px] font-black uppercase tracking-widest">
                                                    <span>{item.city} ({item.dept})</span>
                                                    <span>•</span>
                                                    <span>{item.type}</span>
                                                </div>
                                                <p className="text-slate-400 text-xs mt-3 italic">{item.address}</p>
                                            </div>
                                            <button onClick={() => { setModalMode('edit'); setActiveEntry(item); }} className="p-3 bg-white/5 rounded-2xl hover:bg-indigo-600 transition-colors"><Icon name="edit" /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    </div>

                    {modalMode && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay">
                            <div className="glass w-full max-w-xl rounded-[3rem] overflow-hidden">
                                <div className="bg-slate-900 p-8 flex justify-between items-center border-b border-white/5">
                                    <h3 className="font-black uppercase text-xl italic">{modalMode === 'add' ? 'Ajouter' : 'Modifier'}</h3>
                                    <button onClick={() => setModalMode(null)}><Icon name="x" /></button>
                                </div>
                                <form onSubmit={saveEntry} className="p-10 space-y-4">
                                    <input required placeholder="Nom structure" className="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 font-bold" value={activeEntry.name} onChange={e => setActiveEntry({...activeEntry, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required placeholder="Ville" className="p-4 bg-slate-900 rounded-2xl border border-white/10 font-bold" value={activeEntry.city} onChange={e => setActiveEntry({...activeEntry, city: e.target.value})} />
                                        <input required placeholder="Zone (CP ou Nom)" className="p-4 bg-slate-900 rounded-2xl border border-white/10 font-bold" value={activeEntry.dept} onChange={e => setActiveEntry({...activeEntry, dept: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="p-4 bg-slate-900 rounded-2xl border border-white/10 font-black text-xs" value={activeEntry.type} onChange={e => setActiveEntry({...activeEntry, type: e.target.value})}>
                                            <option>Lieu</option><option>Festival</option><option>Booker</option>
                                        </select>
                                        <select className="p-4 bg-slate-900 rounded-2xl border border-white/10 font-black text-xs" value={activeEntry.cat} onChange={e => setActiveEntry({...activeEntry, cat: e.target.value})}>
                                            <option>Accessible</option><option>Plus tard</option>
                                        </select>
                                    </div>
                                    <textarea placeholder="Notes / Adresse" className="w-full p-4 bg-slate-900 rounded-2xl border border-white/10 font-bold" value={activeEntry.address} onChange={e => setActiveEntry({...activeEntry, address: e.target.value})} />
                                    <button type="submit" className="w-full py-5 bg-indigo-600 rounded-[2rem] font-black uppercase tracking-widest text-xs">Enregistrer</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
