<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDAYA MAP - Live Sync 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; height: 100vh; overflow: hidden; }
        .dept-path { fill: #ffffff; stroke: #818cf8; stroke-width: 0.6; transition: all 0.2s; cursor: pointer; }
        .dept-path:hover { fill: #e0e7ff; stroke: #4338ca; stroke-width: 1.2; }
        .dept-path.has-data { fill: #f1f5f9; stroke: #6366f1; stroke-width: 0.8; }
        .dept-path.selected { fill: #4338ca; stroke: #1e1b4b; stroke-width: 1.5; }
        .map-tooltip { position: fixed; pointer-events: none; background: #1e293b; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; z-index: 1000; text-transform: uppercase; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .main-layout { display: grid; grid-template-columns: 520px 1fr; height: calc(100vh - 80px); }
        .modal-overlay { background-color: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px); z-index: 100; }
        .france-svg { width: 100%; height: auto; max-width: 480px; filter: drop-shadow(0 12px 24px rgba(0,0,0,0.06)); display: block; margin: auto; }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        // --- CONFIGURATION FIREBASE ---
        // Remplacez les valeurs ci-dessous par celles de votre console Firebase
        const firebaseConfig = {
            apiKey: "VOTRE_API_KEY",
            authDomain: "VOTRE_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://VOTRE_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "VOTRE_PROJECT_ID",
            storageBucket: "VOTRE_PROJECT_ID.appspot.com",
            messagingSenderId: "VOTRE_SENDER_ID",
            appId: "VOTRE_APP_ID"
        };

        // Initialisation de Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        const Icon = ({ name }) => {
            if (name === 'plus') return <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
            if (name === 'edit') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
            if (name === 'globe') return <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>;
            if (name === 'x') return <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
            return null;
        };

        const App = () => {
            const [localData, setLocalData] = useState([]);
            const [selectedDept, setSelectedDept] = useState(null);
            const [hoveredDept, setHoveredDept] = useState(null);
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [filters, setFilters] = useState({ type: 'All', cat: 'All' });
            const [geoPaths, setGeoPaths] = useState([]);
            const [modalMode, setModalMode] = useState(null);
            const [activeEntry, setActiveEntry] = useState(null);

            // ÉCOUTE FIREBASE EN TEMPS RÉEL
            useEffect(() => {
                const dataRef = db.ref('opportunities');
                dataRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        // Conversion de l'objet Firebase en tableau
                        const list = Object.keys(data).map(key => ({
                            ...data[key],
                            fbKey: key // On garde la clé Firebase pour la modif
                        }));
                        setLocalData(list);
                    } else {
                        setLocalData([]);
                    }
                });
                return () => dataRef.off();
            }, []);

            // CHARGEMENT CARTE
            useEffect(() => {
                fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/departements-version-simplifiee.geojson')
                    .then(res => res.json())
                    .then(data => {
                        const paths = data.features.map(f => ({ 
                            id: f.properties.code, 
                            name: f.properties.nom, 
                            geometry: f.geometry 
                        }));
                        setGeoPaths(paths);
                    });
            }, []);

            const saveEntry = (e) => {
                e.preventDefault();
                if (modalMode === 'add') {
                    db.ref('opportunities').push({
                        ...activeEntry,
                        id: Date.now()
                    });
                } else {
                    const { fbKey, ...updates } = activeEntry;
                    db.ref(`opportunities/${fbKey}`).set(updates);
                }
                setModalMode(null);
                setActiveEntry(null);
            };

            const deleteEntry = (fbKey) => {
                if(window.confirm("Supprimer cette opportunité ?")) {
                    db.ref(`opportunities/${fbKey}`).remove();
                }
            };

            // LOGIQUE DE DESSIN ET FILTRES (Conservée de votre version)
            const project = (coords) => {
                const x = (coords[0] + 5.15) * 44; 
                const y = (51.45 - coords[1]) * 64; 
                return [x, y];
            };

            const renderPath = (geometry) => {
                if (geometry.type === "Polygon") {
                    return `M ${geometry.coordinates[0].map(c => project(c).join(",")).join(" L ")} Z`;
                } else {
                    return geometry.coordinates.map(poly => `M ${poly[0].map(c => project(c).join(",")).join(" L ")} Z`).join(" ");
                }
            };

            const filteredData = useMemo(() => {
                return localData.filter(item => {
                    const typeMatch = filters.type === 'All' || item.type === filters.type;
                    const catMatch = filters.cat === 'All' || item.cat === filters.cat;
                    const deptMatch = !selectedDept || String(item.dept) === String(selectedDept);
                    return typeMatch && catMatch && deptMatch;
                });
            }, [localData, filters, selectedDept]);

            const deptsWithData = useMemo(() => {
                return new Set(localData.map(d => String(d.dept)));
            }, [localData]);

            return (
                <div className="flex flex-col h-screen overflow-hidden" onMouseMove={(e) => setMousePos({ x: e.clientX, y: e.clientY })}>
                    <header className="bg-slate-900 text-white p-5 flex justify-between items-center shadow-xl z-50">
                        <h1 className="text-2xl font-black italic uppercase tracking-tighter">EDAYA MAP LIVE</h1>
                        <button onClick={() => { setModalMode('add'); setActiveEntry({ name: '', city: '', dept: '', type: 'Lieu', cat: 'Accessible', url: '', email: '', address: '' }); }} 
                                className="bg-indigo-600 hover:bg-indigo-500 px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2">
                            <Icon name="plus" /> NOUVELLE OPPORTUNITÉ
                        </button>
                    </header>

                    <div className="main-layout flex flex-grow overflow-hidden">
                        <aside className="bg-white border-r border-slate-200 flex flex-col shadow-2xl z-40 relative">
                            <div className="p-6 space-y-4 bg-slate-50/50">
                                <div className="grid grid-cols-2 gap-3">
                                    <select onChange={(e) => setFilters(p => ({ ...p, type: e.target.value }))} className="p-3 rounded-xl border-2 border-slate-100 text-[11px] font-black outline-none">
                                        <option value="All">TOUT TYPE</option>
                                        <option value="Lieu">LIEU</option>
                                        <option value="Festival">FESTIVAL</option>
                                        <option value="Booker">BOOKER</option>
                                    </select>
                                    <select onChange={(e) => setFilters(p => ({ ...p, cat: e.target.value }))} className="p-3 rounded-xl border-2 border-slate-100 text-[11px] font-black outline-none">
                                        <option value="All">DISPONIBILITÉ</option>
                                        <option value="Accessible">ACCESSIBLE</option>
                                        <option value="Plus tard">PLUS TARD</option>
                                    </select>
                                </div>
                            </div>

                            <div className="flex-grow flex items-center justify-center p-8 bg-white">
                                <svg viewBox="0 0 600 650" className="france-svg">
                                    {geoPaths.map(dept => (
                                        <path 
                                            key={dept.id} 
                                            d={renderPath(dept.geometry)} 
                                            className={`dept-path ${selectedDept === dept.id ? 'selected' : ''} ${deptsWithData.has(String(dept.id)) ? 'has-data' : ''}`}
                                            onClick={() => setSelectedDept(selectedDept === dept.id ? null : dept.id)}
                                            onMouseEnter={() => setHoveredDept(dept)}
                                            onMouseLeave={() => setHoveredDept(null)}
                                        />
                                    ))}
                                </svg>
                            </div>
                        </aside>

                        <main className="flex-grow overflow-y-auto p-12 bg-slate-50/50 custom-scrollbar">
                            <div className="max-w-4xl mx-auto">
                                <div className="flex justify-between items-end border-b-[6px] border-slate-900 pb-8 mb-10">
                                    <h2 className="text-6xl font-black text-slate-900 uppercase italic tracking-tighter leading-none">
                                        {selectedDept ? `Zone ${selectedDept}` : "Opportunités"}
                                    </h2>
                                </div>

                                <div className="grid gap-3"> 
                                    {filteredData.map(item => (
                                        <div key={item.fbKey} className="bg-white p-5 rounded-[1.2rem] shadow-sm hover:shadow-md transition-all group animate-in">
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <h4 className="text-lg font-black uppercase text-slate-900">{item.name}</h4>
                                                    <div className="flex gap-2 mt-1">
                                                        <span className="text-[9px] font-bold text-slate-400 uppercase">{item.city}</span>
                                                        <span className="text-[9px] font-black text-indigo-600 uppercase">{item.type}</span>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => { setModalMode('edit'); setActiveEntry(item); }} className="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors"><Icon name="edit" /></button>
                                                    <button onClick={() => deleteEntry(item.fbKey)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"><Icon name="x" /></button>
                                                </div>
                                            </div>
                                            <p className="text-xs text-slate-500 mt-3 italic">{item.address}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </main>
                    </div>

                    {modalMode && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 modal-overlay">
                            <div className="bg-white w-full max-w-xl rounded-[3rem] shadow-2xl overflow-hidden border border-white/20">
                                <div className="bg-slate-900 p-8 text-white flex justify-between items-center">
                                    <h3 className="font-black uppercase text-2xl italic">{modalMode === 'add' ? 'Ajouter' : 'Modifier'}</h3>
                                    <button onClick={() => setModalMode(null)}><Icon name="x" /></button>
                                </div>
                                <form onSubmit={saveEntry} className="p-10 space-y-4">
                                    <input required placeholder="Nom" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold" value={activeEntry.name} onChange={e => setActiveEntry({...activeEntry, name: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required placeholder="Ville" className="p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold" value={activeEntry.city} onChange={e => setActiveEntry({...activeEntry, city: e.target.value})} />
                                        <input required placeholder="Dépt (ex: 75)" className="p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold" value={activeEntry.dept} onChange={e => setActiveEntry({...activeEntry, dept: e.target.value})} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <select className="p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-black text-xs" value={activeEntry.type} onChange={e => setActiveEntry({...activeEntry, type: e.target.value})}>
                                            <option>Lieu</option><option>Festival</option><option>Booker</option>
                                        </select>
                                        <select className="p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-black text-xs" value={activeEntry.cat} onChange={e => setActiveEntry({...activeEntry, cat: e.target.value})}>
                                            <option>Accessible</option><option>Plus tard</option>
                                        </select>
                                    </div>
                                    <textarea placeholder="Notes / Adresse" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-100 font-bold" value={activeEntry.address} onChange={e => setActiveEntry({...activeEntry, address: e.target.value})} />
                                    <button type="submit" className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black uppercase tracking-widest text-xs">Mettre à jour sur le Cloud</button>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
